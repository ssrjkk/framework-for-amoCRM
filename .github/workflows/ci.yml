name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - smoke
          - critical
          - regression

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # ============================================
  # LINT & CODE QUALITY
  # ============================================
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Cache ruff
        uses: actions/cache@v4
        with:
          path: .ruff_cache
          key: ruff-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ruff-${{ runner.os }}-

      - name: Run Ruff
        run: ruff check . --output-format=github

      - name: Run MyPy
        run: mypy api core config --ignore-missing-imports
        continue-on-error: true

      - name: Cache mypy
        uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            mypy-${{ runner.os }}-

  # ============================================
# UNIT TESTS
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest tests/ -v --cov --cov-report=xml --cov-fail-under=70 -m "not integration"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # ============================================
  # SMOKE TESTS (Fast feedback)
  # ============================================
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache pytest
        uses: actions/cache@v4
        with:
          path: .pytest_cache
          key: pytest-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pytest-${{ runner.os }}-

      - name: Run smoke tests
        run: |
          pip install -r requirements.txt
          pytest tests/ -m smoke -v --tb=short -n auto --maxfail=5

  # ============================================
  # API TESTS (Matrix)
  # ============================================
  api-tests:
    name: API Tests (${{ matrix.test_category }})
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        test_category:
          - auth
          - crud
          - contracts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run API tests
        run: |
          pytest pipelines/api/tests/test_${{ matrix.test_category }}.py \
            -v --alluredir=reports/allure-api-${{ matrix.test_category }} \
            -n auto --tb=short

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-api-${{ matrix.test_category }}
          path: reports/allure-api-${{ matrix.test_category }}/
          retention-days: 7

  # ============================================
  # DATABASE TESTS
  # ============================================
  db-tests:
    name: Database Tests
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ secrets.DB_USER || 'test' }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD || 'test' }}
          POSTGRES_DB: ${{ secrets.DB_NAME || 'amocrm_test' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Run DB tests
        run: |
          pip install -r requirements.txt
          export DATABASE_URL=postgresql://${{ secrets.DB_USER || 'test' }}:${{ secrets.DB_PASSWORD || 'test' }}@localhost:5432/${{ secrets.DB_NAME || 'amocrm_test' }}
          pytest pipelines/db/ -m db -v --alluredir=reports/allure-db -n auto

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-db
          path: reports/allure-db/
          retention-days: 7

  # ============================================
  # UI TESTS (Playwright)
  # ============================================
  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Playwright
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run UI tests
        run: |
          pytest pipelines/ui/ -m ui -v --alluredir=reports/allure-ui -n auto --tb=short
        continue-on-error: true

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-ui
          path: reports/allure-ui/

  # ============================================
  # CROSS-BROWSER TESTS
  # ============================================
  crossbrowser-tests:
    name: Cross-Browser Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run cross-browser tests
        run: |
          pip install -r requirements.txt
          pytest pipelines/crossbrowser/ -m crossbrowser -v -n auto
        continue-on-error: true

  # ============================================
  # KAFKA TESTS (Optional - requires external infra)
  # ============================================
  kafka-tests:
    name: Kafka Tests
    runs-on: ubuntu-latest
    needs: [lint]
    if: false  # Disabled - requires running Kafka cluster
    steps:
      - name: Kafka tests skipped
        run: echo "Kafka tests require external Kafka cluster"

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-kafka
          path: reports/allure-kafka/

  # ============================================
  # LOAD TESTS
  # ============================================
  load-tests:
    name: Load Tests
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run load tests
        run: |
          pip install -r requirements.txt
          locust -f pipelines/load/locustfile.py \
            --headless \
            --users 100 \
            --spawn-rate 10 \
            --run-time 60s \
            --host ${{ secrets.APP_URL || 'http://localhost:8080' }} \
            --html reports/load-report.html

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: load-report
          path: reports/load-report.html

  # ============================================
  # BUILD & DEPLOY (on main only)
  # ============================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t amocrm-qa:${{ github.sha }} .

      - name: Run container smoke test
        run: |
          docker run -d --name test-app -p 8080:8080 amocrm-qa:${{ github.sha }}
          sleep 10
          curl -f http://localhost:8080/health || exit 1
          docker stop test-app

  # ============================================
  # ALLURE REPORT GENERATION
  # ============================================
  generate-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: [api-tests, db-tests]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: reports/
          merge-multiple: true

      - name: Consolidate Allure results
        run: |
          mkdir -p reports/allure-results
          find reports -name "*.json" -type f -exec mv {} reports/allure-results/ \; 2>/dev/null || true

      - name: Install Allure
        run: |
          curl -sL https://get.allure.io/install.sh | bash
          export PATH=$PATH:$ALLURE_HOME/bin

      - name: Generate report
        run: |
          allure generate reports/allure-results -o allure-report --quiet

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report

  # ============================================
  # NOTIFICATIONS
  # ============================================
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, smoke-tests, api-tests, db-tests]
    if: failure() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Get failed jobs
        id: failed_jobs
        run: |
          FAILED_JOBS=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs \
            --jq '.jobs[] | select(.conclusion == "failure") | .name' \
            2>/dev/null | tr '\n' ',' | sed 's/,$//')
          echo "failed_jobs=$FAILED_JOBS" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Telegram notification
        run: |
          TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          FAILED_JOBS="${{ steps.failed_jobs.outputs.failed_jobs }}"
          
          MESSAGE="🔴 CI FAILED on \`$BRANCH\` branch%0A%0ARepo: \`$REPO\`%0AJobs: $FAILED_JOBS%0A%0A🔗 [View runs]($RUN_URL)"
          
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d text="$MESSAGE" \
            -d parse_mode="Markdown"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        if: secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != ''

      - name: Send Discord notification
        if: secrets.DISCORD_WEBHOOK != ''
        run: |
          curl -X POST ${{ secrets.DISCORD_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d '{"content": "⚠️ CI Pipeline FAILED on main branch! Check: https://github.com/${{ github.repository }}/actions"}'

      - name: Send Slack notification
        if: false
        run: |
          echo "Add Slack webhook to secrets to enable notifications"

  # ============================================
  # NOTIFICATIONS SUCCESS
  # ============================================
  notify-success:
    name: Notify on Success
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, smoke-tests, api-tests, db-tests]
    if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Send Telegram success notification
        run: |
          TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}"
          TELEGRAM_CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          MESSAGE="✅ CI PASSED on \`$BRANCH\` branch%0A%0ARepo: \`$REPO\`%0A%0A🔗 [View runs]($RUN_URL)"
          
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            -d text="$MESSAGE" \
            -d parse_mode="Markdown"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        if: secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != ''