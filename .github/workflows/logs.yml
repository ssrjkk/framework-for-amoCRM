name: Log Analysis Pipeline

on:
  workflow_run:
    workflows: ["API Pipeline", "DB Pipeline", "K8s Smoke Pipeline"]
    types: [completed]
  workflow_dispatch:
    inputs:
      start_time:
        description: "Start time (ISO 8601)"
        required: false
      end_time:
        description: "End time (ISO 8601)"
        required: false
  schedule:
    - cron: "0 6 * * 1"

jobs:
  log-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run log analysis tests
        env:
          KIBANA_URL: ${{ secrets.KIBANA_URL }}
          ES_HOST: ${{ secrets.ES_HOST }}
        run: |
          pytest pipelines/logs/ -m logs -v \
            --alluredir=reports/allure-results \
            -n auto \
            --tb=short

      - name: Check for errors
        run: |
          python -c "
          import os
          import json
          results_dir = 'reports/allure-results'
          errors_found = False
          if os.path.exists(results_dir):
              for f in os.listdir(results_dir):
                  if f.endswith('.json'):
                      with open(os.path.join(results_dir, f)) as fp:
                          data = json.load(fp)
                          if 'status' in data and data['status'] == 'failed':
                              errors_found = True
          exit(1 if errors_found else 0)
          "

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logs-allure-results
          path: reports/allure-results/
          retention-days: 30

  kibana-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Check Kibana health
        run: |
          curl -f -u ${{ secrets.ES_USER }}:${{ secrets.ES_PASSWORD }} \
            ${{ secrets.ES_HOST }}/_cluster/health || exit 1

      - name: Upload health status
        uses: actions/upload-artifact@v4
        with:
          name: kibana-health
          path: reports/