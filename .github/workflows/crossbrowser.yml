name: Cross-Browser Pipeline

on:
  push:
    branches: [main, develop]
    paths: ["pipelines/crossbrowser/**", "requirements.txt", "pytest.ini"]
  pull_request:
    paths: ["pipelines/crossbrowser/**", "requirements.txt", "pytest.ini"]
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  crossbrowser-tests:
    runs-on: ubuntu-latest
    services:
      selenium-hub:
        image: selenium/hub:4.18
        ports:
          - 4444:4444
      chrome:
        image: selenium/node-chrome:4.18
        env:
          SE_EVENT_BUS_HOST: selenium-hub
          SE_EVENT_BUS_PUBLISH_PORT: 4442
          SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
      firefox:
        image: selenium/node-firefox:4.18
        env:
          SE_EVENT_BUS_HOST: selenium-hub
          SE_EVENT_BUS_PUBLISH_PORT: 4442
          SE_EVENT_BUS_SUBSCRIBE_PORT: 4443
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for Selenium Grid
        run: sleep 10

      - name: Run crossbrowser tests
        env:
          SELENIUM_GRID: http://localhost:4444/wd/hub
        run: |
          pytest pipelines/crossbrowser/ -m crossbrowser -v \
            --alluredir=reports/allure-results \
            -n auto \
            --tb=short

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: crossbrowser-allure-results
          path: reports/allure-results/
          retention-days: 30