[pytest]
asyncio_mode = auto
addopts = -v --tb=short --alluredir=reports/allure-results
markers =
    api: API pipeline tests
    db: Database pipeline tests
    consistency: UI/API/DB consistency tests
    integrity: Data integrity tests
    kafka: Kafka / async event tests
    async_flow: Async flow tests
    dlq: Dead letter queue tests
    load: Load testing (locust)
    k8s: Kubernetes smoke and health tests
    smoke: Quick smoke tests
    health: Health check tests
    crossbrowser: Cross-browser Selenium Grid tests
    sel_grid: Selenium Grid tests
    logs: Log analysis pipeline tests
    kibana: Kibana/Elasticsearch tests
    ui: UI tests (Playwright)
    critical: Critical UI scenarios
    contract: Contract validation tests
testpaths =
    pipelines
python_files = test_*.py
python_classes = Test*
python_functions = test_*
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning